<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid px-4">
    <span class="navbar-brand mb-0 h1 fw-bold">6 Minute Walk Test</span>
  </div>
</nav>

<main class="container py-5">
  <div class="row justify-content-center">
    <!-- Restricts the card width on larger screens, full width on mobile -->
    <div class="col-12 col-md-8 col-lg-5">

      <!-- Material-style Card -->
      <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-4 p-md-5">
          <h3 class="text-center mb-4 text-primary fw-bold">Enter Your Details</h3>

          <!-- Age -->
          <div class="form-floating mb-3">
            <input type="number" [(ngModel)]="age" class="form-control" id="InputAge" placeholder="Age">
            <label for="InputAge">Age (years)</label>
          </div>

          <!-- Height -->
          <div class="form-floating mb-3">
            <input type="number" [(ngModel)]="height" class="form-control" id="InputHeight" placeholder="Height">
            <label for="InputHeight">Height (cm)</label>
          </div>

          <!-- Weight -->
          <div class="form-floating mb-4">
            <input type="number" [(ngModel)]="weight" class="form-control" id="InputWeight" placeholder="Weight">
            <label for="InputWeight">Weight (kg)</label>
          </div>

          <!-- Gender -->
          <div class="mb-4 text-center">
            <label class="form-label d-block text-muted small fw-bold text-uppercase mb-2">Gender</label>
            <div class="btn-group w-100 shadow-sm" role="group" aria-label="Gender Selection">
              <input type="radio" class="btn-check" name="radioGender" id="radioMale" value="male" [(ngModel)]="gender"
                autocomplete="off">
              <label class="btn btn-outline-primary" for="radioMale">Male</label>

              <input type="radio" class="btn-check" name="radioGender" id="radioFemale" value="female"
                [(ngModel)]="gender" autocomplete="off">
              <label class="btn btn-outline-primary" for="radioFemale">Female</label>
            </div>
          </div>

          <div class="form-floating mb-4">
            <input type="number" [(ngModel)]="actDist" class="form-control" id="InputActualWalkDist"
              placeholder="Actual Distance Walked">
            <label for="InputActualWalkDist">Actual Distance Walked (m)</label>
          </div>

          <!-- Styled Button -->
          @if (age && height && weight && gender){
          <button class="btn btn-primary btn-lg w-100 shadow-sm rounded-pill" (click)="calculate()">
            Calculate Distance Walked
          </button>
          }

          <!-- Result Block -->
          @if (calDist) {
          <div class="alert alert-success mt-4 mb-0 text-center border-0 shadow-sm" role="alert">
            <p class="mb-1 text-success-emphasis text-uppercase small fw-bold">Distance Walked Calculated (m)</p>
            <h2 class="mb-0 text-success fw-bolder">{{ calDist }}</h2>
          </div>

          @if (actDist){
          <div class="alert alert-success mt-4 mb-0 text-center border-0 shadow-sm" role="alert">
            <p class="mb-1 text-success-emphasis text-uppercase small fw-bold">Deviation Percentage</p>
            <h2 class="mb-0 text-success fw-bolder">{{ deviation }}%</h2>
          </div>
          }
          }
        </div>
      </div>

    </div>
  </div>
</main>
